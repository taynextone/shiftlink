services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: shiftlink-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://shiftlink:${DB_PASSWORD:-password}@db:5432/shiftlink?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "/app/scripts/healthcheck.js"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
    networks:
      - shiftlink-net

  db:
    image: postgres:16-alpine
    container_name: shiftlink-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=shiftlink
      - POSTGRES_USER=shiftlink
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiftlink"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shiftlink-net

  redis:
    image: redis:7-alpine
    container_name: shiftlink-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shiftlink-net

  nginx:
    image: nginx:alpine
    container_name: shiftlink-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - shiftlink-net

volumes:
  pgdata:
  app-uploads:
  redis-data:

networks:
  shiftlink-net:
    driver: bridge
