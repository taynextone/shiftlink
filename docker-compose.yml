services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: shiftlink-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://shiftlink:${DB_PASSWORD}@db:5432/shiftlink?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app-uploads:/app/uploads
    networks:
      - shiftlink-net

  db:
    image: postgres:16-alpine
    container_name: shiftlink-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=shiftlink
      - POSTGRES_USER=shiftlink
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiftlink"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shiftlink-net

  # Optional: Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: shiftlink-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - shiftlink-net

volumes:
  pgdata:
  app-uploads:

networks:
  shiftlink-net:
    driver: bridge
